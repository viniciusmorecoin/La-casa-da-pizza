<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>La Casa da Pizza</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ea1d2c">

</head>

<body>

<header class="topo">

<h1>🍕 La Casa da Pizza</h1>

<input id="buscar" placeholder="Buscar pizza...">

</header>

<div class="categorias">

<button onclick="filtrar('salgada')">Salgadas</button>
<button onclick="filtrar('doce')">Doces</button>
<button onclick="filtrar('combo')">Combos</button>
<button onclick="filtrar('bebida')">Bebidas</button>

</div>

<div id="lista" class="lista"></div>


<div class="cart-btn" onclick="abrirCarrinho()">

🛒 <span id="contador">0</span>

<span id="valor">R$0</span>

</div>


<div id="carrinho" class="carrinho">

<h2>Seu Pedido</h2>

<div id="itens"></div>

<h3>Borda recheada</h3>

<select id="borda">

<option value="0">Sem borda</option>
<option value="10">Cheddar +10</option>
<option value="10">Catupiry +10</option>
<option value="12">Chocolate +12</option>

</select>

<h3>Cupom</h3>

<input id="cupom">

<button onclick="aplicarCupom()">Aplicar</button>

<h3>Entrega</h3>

<select id="bairro" onchange="calcEntrega()">

<option value="5">Areal</option>
<option value="7">Taguatinga</option>
<option value="10">Águas Claras</option>

</select>

<h3>Pagamento</h3>

<select id="pag">

<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>

</select>

<input id="nome" placeholder="Seu nome">

<input id="endereco" placeholder="Endereço">

<div class="totais">

Subtotal <span id="subtotal"></span><br>
Desconto <span id="desconto"></span><br>
Entrega <span id="taxa"></span><br>

<h2>Total <span id="total"></span></h2>

</div>

<button class="finalizar" onclick="enviarPedido()">

FINALIZAR PEDIDO

</button>

</div>

<script src="script.js"></script>

</body>
</html>
