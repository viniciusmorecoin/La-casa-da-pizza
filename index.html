<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Casa da Pizza</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🍕 La Casa da Pizza</h1>

<div class="categorias">

<button onclick="filtrar('salgada')">Pizzas Salgadas</button>

<button onclick="filtrar('doce')">Pizzas Doces</button>

<button onclick="filtrar('combo')">Combos</button>

<button onclick="filtrar('bebida')">Bebidas</button>

</div>

</header>

<div id="lista" class="lista"></div>


<div id="cart-bar" onclick="abrirCarrinho()">

<span id="contador">0 itens</span>

<span id="total-btn">R$ 0,00</span>

</div>


<div id="modal-carrinho" class="modal">

<div class="modal-content">

<h2>Seu Pedido</h2>

<div id="itens"></div>


<h3>Borda recheada</h3>

<select id="borda">

<option value="0">Sem borda</option>

<option value="10">Cheddar +10</option>

<option value="10">Catupiry +10</option>

<option value="12">Chocolate +12</option>

</select>


<h3>Cupom</h3>

<input id="cupom">

<button onclick="aplicarCupom()">Aplicar</button>


<h3>Entrega</h3>

<select id="bairro" onchange="calcularEntrega()">

<option value="5">Areal - 5</option>

<option value="7">Taguatinga - 7</option>

<option value="10">Águas Claras - 10</option>

</select>


<h3>Pagamento</h3>

<select id="pagamento" onchange="verificarPix()">

<option>Dinheiro</option>

<option>Pix</option>

<option>Cartão</option>

</select>

<div id="pix-box">

<p>Pix: 61998791411</p>

</div>


<input id="nome" placeholder="Seu nome">

<input id="endereco" placeholder="Endereço">

<div class="total-box">

Subtotal: <span id="subtotal"></span><br>

Desconto: <span id="desconto"></span><br>

Total: <span id="total"></span>

</div>


<button class="finalizar" onclick="finalizarPedido()">

Finalizar Pedido

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
