<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Casa da Pizza</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8B0000">

</head>

<body>

<header>
<h1>🍕 La Casa da Pizza</h1>
<p>Peça sua pizza favorita</p>
</header>

<section id="cardapio">

<h2>Cardápio</h2>

<div class="pizza">
<h3>Calabresa</h3>
<p>Molho, mussarela e calabresa</p>
<button onclick="addPizza('Calabresa')">Adicionar</button>
</div>

<div class="pizza">
<h3>Marguerita</h3>
<p>Molho, mussarela, tomate e manjericão</p>
<button onclick="addPizza('Marguerita')">Adicionar</button>
</div>

<div class="pizza">
<h3>Frango com Catupiry</h3>
<p>Molho, frango e catupiry</p>
<button onclick="addPizza('Frango')">Adicionar</button>
</div>

</section>

<section>

<h2>🛒 Carrinho</h2>

<ul id="carrinho"></ul>

<button onclick="finalizarPedido()">Finalizar Pedido</button>

</section>

<section>

<h2>⭐ Fidelidade</h2>

<div id="contadorFidelidade"></div>

</section>

<section>

<h2>🏆 Ranking de Clientes</h2>

<ul id="ranking"></ul>

</section>

<script src="script.js"></script>

</body>
</html>
